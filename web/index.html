<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAARSY Meteor Orbit Visualizer</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <canvas id="scene"></canvas>

    <aside class="panel">
      <header>
        <h1>MAARSY Meteors</h1>
        <div id="status">Loading full orbit catalogue...</div>
      </header>

      <label>
        Color
        <select id="colorParam"></select>
      </label>

      <label>
        <span class="control-head"><span>Speed</span><span class="control-value" id="speedValue"></span></span>
        <input id="speed" type="range" min="-120" max="120" step="1" value="18">
      </label>

      <label>
        <span class="control-head"><span>Trail</span><span class="control-value" id="trailValue"></span></span>
        <input id="trail" type="range" min="5" max="730" step="5" value="180">
      </label>

      <label>
        <span class="control-head"><span>Mean lifetime</span><span class="control-value" id="cycleDaysValue"></span></span>
        <input id="cycleDays" type="range" min="1" max="180" step="1" value="30">
      </label>

      <label>
        <span class="control-head"><span>Meteoroids</span><span class="control-value" id="drawLimitValue"></span></span>
        <input id="drawLimit" type="range" min="1" max="10000" step="1" value="1000">
      </label>

      <label>
        <span class="control-head"><span>Alpha</span><span class="control-value" id="alphaValue"></span></span>
        <input id="alpha" type="range" min="0.25" max="6" step="0.25" value="1">
      </label>

      <label>
        <span class="control-head"><span>Stars</span><span class="control-value" id="starVisibilityValue"></span></span>
        <input id="starVisibility" type="range" min="0.25" max="8" step="0.25" value="3">
      </label>

      <label>
        <span class="control-head"><span>Planet radius</span><span class="control-value" id="planetSizeValue"></span></span>
        <input id="planetSize" type="range" min="4" max="40" step="1" value="16">
      </label>

      <label>
        <span class="control-head"><span>Axis limit</span><span class="control-value" id="radiusValue"></span></span>
        <input id="radius" type="range" min="0" max="100" step="1" value="6">
      </label>

      <section class="filters">
        <div class="section-title">Filters</div>
        <div id="filterControls"></div>
      </section>

      <div class="row">
        <button id="playPause" type="button">Pause</button>
        <button id="resetView" type="button">Reset</button>
      </div>

      <dl>
        <div><dt>Meteors</dt><dd id="count">-</dd></div>
        <div><dt>Visible</dt><dd id="visibleCount">-</dd></div>
        <div><dt>Drawn</dt><dd id="drawnCount">-</dd></div>
        <div><dt>Axis limit</dt><dd id="axisReadout">6 AU</dd></div>
        <div><dt>Date offset</dt><dd id="timeReadout">0 d</dd></div>
        <div><dt>Color range</dt><dd id="rangeReadout">-</dd></div>
      </dl>
    </aside>

    <div class="legend">
      <span id="legendMin"></span>
      <div class="ramp"></div>
      <span id="legendMax"></span>
    </div>

    <script src="./data/maarsy_full_manifest.js"></script>
    <script src="./data/tycho2_mag8_embedded.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
